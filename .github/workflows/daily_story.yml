name: Daily Story Short Video

on:
  schedule:
    # Run daily at 09:00 UTC (2:00 PM in +5:00 / 5:00 AM in Eastern)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write # Required to commit back the used status in stories.json

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies (FFmpeg and Fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Story Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python daily_pipeline.py

      - name: Commit and push updated stories.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/stories.json
          # Commit only if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: mark story as used [skip ci]" && git push)
